name: awesome-lint

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - ".github/workflows/awesome-lint.yml"
  pull_request:
    paths:
      - "README.md"
      - ".github/workflows/awesome-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run awesome-lint
        run: npx awesome-lint
