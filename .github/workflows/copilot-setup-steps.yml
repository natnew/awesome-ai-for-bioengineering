name: Copilot setup steps

on:
  workflow_dispatch: {}
  pull_request: {}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (if present)
        run: |
          if [ -f package.json ]; then npm ci; fi
      - name: Run repo checks
        run: |
          npx --yes awesome-lint . || true
          npx --yes markdown-link-check README.md || true
